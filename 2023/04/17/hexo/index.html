<h1 id="GitHub-Pages-Hexo"><a href="#GitHub-Pages-Hexo" class="headerlink" title="GitHub Pages + Hexo"></a>GitHub Pages + Hexo</h1><ol>
<li><p>安装 <a target="_blank" rel="noopener" href="https://nodejs.org/">nodejs</a></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line">$ npm -v</span><br><span class="line">9.5.1</span><br><span class="line">$ npm config <span class="built_in">set</span> registry https://registry.npm.taobao.org</span><br><span class="line"></span><br><span class="line"><span class="comment"># 安装 hexo</span></span><br><span class="line">$ npm i hexo-cli -g</span><br><span class="line">changed 60 packages <span class="keyword">in</span> 31s</span><br><span class="line">npm notice</span><br><span class="line">npm notice New minor version of npm available! 9.5.1 -&gt; 9.6.4</span><br><span class="line">npm notice Changelog: &lt;https://github.com/npm/cli/releases/tag/v9.6.4&gt;</span><br><span class="line">npm notice Run `npm install -g npm@9.6.4` to update!</span><br><span class="line">npm notice</span><br><span class="line"></span><br><span class="line">$ hexo -v</span><br><span class="line"><span class="comment"># 初始化目录</span></span><br><span class="line">$ hexo init</span><br><span class="line"><span class="comment"># 生成页面</span></span><br><span class="line">$ hexo g</span><br><span class="line"><span class="comment"># 启动本地服务</span></span><br><span class="line">$ hexo s</span><br></pre></td></tr></table></figure></li>
<li><p>安装 <a target="_blank" rel="noopener" href="https://git-scm.com/">git</a></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">git config --global user.name <span class="string">&quot;hcjjj&quot;</span></span><br><span class="line">git config --global user.email <span class="string">&quot;hcjjj@foxmail.com&quot;</span></span><br><span class="line"><span class="comment"># 生成密钥SSH key</span></span><br><span class="line">ssh-keygen -t rsa -C <span class="string">&quot;hcjjj@foxmail.com&quot;</span></span><br><span class="line"><span class="comment"># 填入 github 设置的 SSH and GPG keys</span></span><br><span class="line">$ <span class="built_in">cat</span> /c/Users/Administrator/.ssh/id_ed25519.pub</span><br><span class="line"><span class="comment"># 验证</span></span><br><span class="line">$ ssh -T git@github.com</span><br><span class="line">Hi hcjjj! You<span class="string">&#x27;ve successfully authenticated, but GitHub does not provide shell access.</span></span><br></pre></td></tr></table></figure></li>
<li><p>推送到 github</p>
<p>在博客根目录下，安装扩展：<code>npm i hexo-deployer-git</code></p>
<p>修改目录下的 <code>_config.yml</code> 文件：</p>
<figure class="highlight yaml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># Deployment</span></span><br><span class="line"><span class="comment">## Docs: https://hexo.io/docs/one-command-deployment</span></span><br><span class="line"><span class="attr">deploy:</span></span><br><span class="line">  <span class="attr">type:</span> <span class="string">git</span></span><br><span class="line">  <span class="attr">repository:</span> <span class="string">https://github.com/hcjjj/hcjjj.github.io.git</span></span><br><span class="line">  <span class="attr">branch:</span> <span class="string">master</span></span><br></pre></td></tr></table></figure>

<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 生成静态网页</span></span><br><span class="line">hexo g</span><br><span class="line"><span class="comment"># 本地预览</span></span><br><span class="line">hexo s</span><br><span class="line"><span class="comment"># 上传到github</span></span><br><span class="line">hexo d</span><br></pre></td></tr></table></figure></li>
</ol>
