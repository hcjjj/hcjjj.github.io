an class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">输入：</span></span><br><span class="line"><span class="comment">6 5</span></span><br><span class="line"><span class="comment">0 1 0 0 0</span></span><br><span class="line"><span class="comment">0 0 0 1 0</span></span><br><span class="line"><span class="comment">0 1 0 1 0</span></span><br><span class="line"><span class="comment">1 1 1 0 0</span></span><br><span class="line"><span class="comment">0 1 0 0 1</span></span><br><span class="line"><span class="comment">0 1 0 0 0</span></span><br><span class="line"><span class="comment">入口左上角，出口右下角，`1` 是障碍物</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">输出：</span></span><br><span class="line"><span class="comment">  0  0  4  5  6</span></span><br><span class="line"><span class="comment">  1  2  3  0  7</span></span><br><span class="line"><span class="comment">  2  0  4  0  8</span></span><br><span class="line"><span class="comment">  0  0  0 10  9</span></span><br><span class="line"><span class="comment">  0  0 12 11  0</span></span><br><span class="line"><span class="comment">  0  0 13 12 13</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;os&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">readMaze</span><span class="params">(filename <span class="type">string</span>)</span></span> [][]<span class="type">int</span> &#123;</span><br><span class="line">	<span class="comment">// 读取二维地图数据</span></span><br><span class="line">	file, err := os.Open(filename)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		<span class="built_in">panic</span>(err)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">var</span> row, col <span class="type">int</span></span><br><span class="line">	<span class="comment">// 读取文件第一行的行列数据</span></span><br><span class="line">	fmt.Fscanf(file, <span class="string">&quot;%d %d&quot;</span>, &amp;row, &amp;col)</span><br><span class="line">	<span class="comment">// 创建地图</span></span><br><span class="line">	maze := <span class="built_in">make</span>([][]<span class="type">int</span>, row)</span><br><span class="line">	<span class="keyword">for</span> i := <span class="keyword">range</span> maze &#123;</span><br><span class="line">		maze[i] = <span class="built_in">make</span>([]<span class="type">int</span>, col)</span><br><span class="line">		<span class="keyword">for</span> j := <span class="keyword">range</span> maze[i] &#123;</span><br><span class="line">			fmt.Fscanf(file, <span class="string">&quot;%d&quot;</span>, &amp;maze[i][j])</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> maze</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> point <span class="keyword">struct</span> &#123;</span><br><span class="line">	i, j <span class="type">int</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> dirs = [<span class="number">4</span>]point&#123;</span><br><span class="line">	&#123;<span class="number">-1</span>, <span class="number">0</span>&#125;, &#123;<span class="number">0</span>, <span class="number">-1</span>&#125;, &#123;<span class="number">1</span>, <span class="number">0</span>&#125;, &#123;<span class="number">0</span>, <span class="number">1</span>&#125;&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(p point)</span></span> add(r point) point &#123;</span><br><span class="line">	<span class="keyword">return</span> point&#123;p.i + r.i, p.j + r.j&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(p point)</span></span> at(grid [][]<span class="type">int</span>) (<span class="type">int</span>, <span class="type">bool</span>) &#123;</span><br><span class="line">	<span class="keyword">if</span> p.i &lt; <span class="number">0</span> || p.i &gt;= <span class="built_in">len</span>(grid) &#123;</span><br><span class="line">		<span class="keyword">return</span> <span class="number">0</span>, <span class="literal">false</span></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> p.j &lt; <span class="number">0</span> || p.j &gt;= <span class="built_in">len</span>(grid[p.i]) &#123;</span><br><span class="line">		<span class="keyword">return</span> <span class="number">0</span>, <span class="literal">false</span></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">return</span> grid[p.i][p.j], <span class="literal">true</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">walk</span><span class="params">(maze [][]<span class="type">int</span>,</span></span></span><br><span class="line"><span class="params"><span class="function">	start, end point)</span></span> [][]<span class="type">int</span> &#123;</span><br><span class="line">	<span class="comment">// 创建步数数据</span></span><br><span class="line">	steps := <span class="built_in">make</span>([][]<span class="type">int</span>, <span class="built_in">len</span>(maze))</span><br><span class="line">	<span class="keyword">for</span> i := <span class="keyword">range</span> steps &#123;</span><br><span class="line">		steps[i] = <span class="built_in">make</span>([]<span class="type">int</span>, <span class="built_in">len</span>(maze[i]))</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// 加入队列的第一个元素</span></span><br><span class="line">	Q := []point&#123;start&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">for</span> <span class="built_in">len</span>(Q) &gt; <span class="number">0</span> &#123;</span><br><span class="line">		cur := Q[<span class="number">0</span>]</span><br><span class="line">		Q = Q[<span class="number">1</span>:]</span><br><span class="line">		<span class="keyword">if</span> cur == end &#123;</span><br><span class="line">			<span class="keyword">break</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">for</span> _, dir := <span class="keyword">range</span> dirs &#123;</span><br><span class="line">			next := cur.add(dir)</span><br><span class="line">			<span class="comment">// 判断新坐标是否合法</span></span><br><span class="line">			val, ok := next.at(maze)</span><br><span class="line">			<span class="comment">// 遇到障碍物也跳过</span></span><br><span class="line">			<span class="keyword">if</span> !ok || val == <span class="number">1</span> &#123;</span><br><span class="line">				<span class="keyword">continue</span></span><br><span class="line">			&#125;</span><br><span class="line">			val, ok = next.at(steps)</span><br><span class="line">			<span class="keyword">if</span> !ok || val != <span class="number">0</span> &#123;</span><br><span class="line">				<span class="keyword">continue</span></span><br><span class="line">			&#125;</span><br><span class="line">			<span class="comment">// 回到原点了</span></span><br><span class="line">			<span class="keyword">if</span> next == start &#123;</span><br><span class="line">				<span class="keyword">continue</span></span><br><span class="line">			&#125;</span><br><span class="line">			curSteps, _ := cur.at(steps)</span><br><span class="line">			<span class="comment">// 填充步数并加入待探索队列</span></span><br><span class="line">			steps[next.i][next.j] =</span><br><span class="line">				curSteps + <span class="number">1</span></span><br><span class="line">			Q = <span class="built_in">append</span>(Q, next)</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">return</span> steps</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span class="comment">// 读取地图</span></span><br><span class="line">	maze := readMaze(<span class="string">&quot;maze/maze.in&quot;</span>)</span><br><span class="line">	<span class="comment">// 从左上角到右下角开始探索</span></span><br><span class="line">	steps := walk(maze, point&#123;<span class="number">0</span>, <span class="number">0</span>&#125;,</span><br><span class="line">		point&#123;<span class="built_in">len</span>(maze) - <span class="number">1</span>, <span class="built_in">len</span>(maze[<span class="number">0</span>]) - <span class="number">1</span>&#125;)</span><br><span class="line">	<span class="comment">// 打印地图</span></span><br><span class="line">	<span class="comment">//for _, row := range maze &#123;</span></span><br><span class="line">	<span class="comment">//	for _, val := range row &#123;</span></span><br><span class="line">	<span class="comment">//		fmt.Printf(&quot;%3d&quot;, val)</span></span><br><span class="line">	<span class="comment">//	&#125;</span></span><br><span class="line">	<span class="comment">//	fmt.Println()</span></span><br><span class="line">	<span class="comment">//&#125;</span></span><br><span class="line">	<span class="comment">// 打印探索过程</span></span><br><span class="line">	<span class="keyword">for</span> _, row := <span class="keyword">range</span> steps &#123;</span><br><span class="line">		<span class="keyword">for</span> _, val := <span class="keyword">range</span> row &#123;</span><br><span class="line">			fmt.Printf(<span class="string">&quot;%3d&quot;</span>, val)</span><br><span class="line">		&#125;</span><br><span class="line">		fmt.Println()</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// <span class="doctag">TODO:</span> construct path from steps</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
